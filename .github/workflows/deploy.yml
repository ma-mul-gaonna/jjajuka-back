name: CI/CD

on:
  push:
    branches: [dev, main, cd-test]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Git clone the repository
        uses: actions/checkout@v3

      - name: configure aws credential
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::415464488514:role/jjajuka-oidc-role
          aws-region: ap-northeast-2

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set ECR Repository
        id: set-repo
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" || "${GITHUB_REF}" == "refs/heads/cd-test" ]]; then
            echo "ECR_REPOSITORY=jjajuka-dev-backend" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "ECR_REPOSITORY=jjajuka-prod-backend" >> $GITHUB_ENV
          fi

      - name: docker image build and push to ecr
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::415464488514:role/jjajuka-oidc-role
          aws-region: ap-northeast-2

      - name: Set deploy target
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" || "${GITHUB_REF}" == "refs/heads/cd-test" ]]; then
            echo "EC2_TAG=jjajuka-dev-app" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "EC2_TAG=jjajuka-prod-app" >> $GITHUB_ENV
          fi

      - name: Deploy via SSM Send Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets '[{"Key":"tag:Name","Values":["'"$EC2_TAG"'"]}]' \
            --parameters '{
              "commands": [
                "bash /opt/scripts/deploy.sh '"${{ github.sha }}"'"
              ]
            }' \
            --timeout-seconds 300 \
            --comment "Deploy ${{ github.sha }}" \
            --query "Command.CommandId" \
            --output text \
            --region ap-northeast-2)

          echo "Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for deployment result
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$EC2_TAG" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ap-northeast-2)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region ap-northeast-2

          echo "Deployment succeeded"
